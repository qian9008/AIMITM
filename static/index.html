<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AiMITM &#x7BA1;&#x7406;&#x540E;&#x53F0;</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; }
        .log-container { height: 500px; overflow-y: auto; font-family: 'JetBrains Mono', monospace; }
        .card { @apply bg-slate-800/50 border border-slate-700 rounded-xl p-6 backdrop-blur-sm; }
        .input-field { @apply bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all; }
        .btn-primary { @apply bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-lg font-medium transition-all shadow-lg shadow-blue-500/20 active:scale-95; }
        .tab-btn { @apply px-4 py-2 font-medium transition-all border-b-2 border-transparent; }
        .tab-btn.active { @apply border-blue-500 text-blue-500; }
    </style>
</head>
<body class="p-8 min-h-screen">
    <div class="max-w-6xl mx-auto space-y-8">
        <header class="flex justify-between items-center">
            <div class="flex items-center">
                <div class="bg-blue-600 p-2 rounded-lg mr-3 shadow-lg shadow-blue-500/30">
                    <span class="font-black text-xl text-white">A</span>
                </div>
                <h1 class="text-2xl font-black tracking-tight text-white">AiMITM <span class="text-blue-500 text-sm font-normal">Core</span></h1>
            </div>
            <div class="flex gap-4 items-center text-sm">
                <span class="flex items-center"><span class="w-2 h-2 bg-green-500 rounded-full mr-2"></span> &#x8282;&#x70B9;&#x5728;&#x7EBF;</span>
                <span class="text-slate-400">|</span>
                <a href="/api/ca/download" class="text-slate-400 hover:text-white flex items-center">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    &#x4E0B;&#x8F7D;&#x6839;&#x8BC1;&#x4E66;
                </a>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="card md:col-span-2 space-y-6">
                <h2 class="text-lg font-bold">&#x57FA;&#x7840;&#x53C2;&#x6570;</h2>
                <div class="grid grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-xs text-slate-400 uppercase font-bold">&#x4EE3;&#x7406;&#x7AEF;&#x53E3;</label>
                        <input id="proxy_port" type="number" class="input-field w-full">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs text-slate-400 uppercase font-bold">&#x7BA1;&#x7406;&#x7AEF;&#x53E3;</label>
                        <input id="admin_port" type="number" class="input-field w-full">
                    </div>
                </div>
                <div class="flex items-center justify-between p-4 bg-slate-900/50 rounded-xl border border-slate-700">
                    <div>
                        <span class="text-sm font-bold text-red-400">&#x5168;&#x91CF;&#x91CD;&#x5B9A;&#x5411; (Redirect All)</span>
                        <p class="text-xs text-slate-500">&#x5F00;&#x542F;&#x540E;&#x6240;&#x6709;&#x8BF7;&#x6C42;&#x5C06;&#x8FDB;&#x5165;&#x5206;&#x6D41;&#x903B;&#x8F91;</p>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input id="redirect_all" type="checkbox" class="sr-only peer">
                        <div class="w-11 h-6 bg-slate-700 rounded-full peer peer-checked:bg-blue-600 peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all"></div>
                    </label>
                </div>
                <div class="flex items-center gap-4">
                    <span class="text-sm text-slate-400">&#x8C03;&#x8BD5;&#x6A21;&#x5F0F;</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input id="debug" type="checkbox" class="sr-only peer">
                        <div class="w-11 h-6 bg-slate-700 rounded-full peer peer-checked:bg-blue-600 peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all"></div>
                    </label>
                </div>
            </div>
            <div class="card space-y-4">
                <h2 class="text-lg font-bold">MITM &#x57DF;&#x540D;</h2>
                <textarea id="mitm_hosts" class="input-field w-full h-64 text-sm font-mono" placeholder="*.openai.com"></textarea>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="card space-y-4">
                <div class="flex justify-between items-center">
                    <h2 class="text-lg font-bold">&#x8F6C;&#x53D1;&#x89C4;&#x5219;&#x7EC4;</h2>
                    <div class="flex gap-2">
                        <button onclick="addGroup()" class="bg-slate-700 hover:bg-slate-600 text-xs px-3 py-1 rounded-lg">+ &#x65B0;&#x5EFA;&#x5206;&#x7EC4;</button>
                        <button onclick="saveConfig()" class="btn-primary py-1.5 text-sm">&#x4FDD;&#x5B58;&#x5E76;&#x5E94;&#x7528;</button>
                    </div>
                </div>
                <div id="upstreams-container" class="space-y-4"></div>
            </div>
            <div class="card space-y-4">
                <h2 class="text-lg font-bold text-blue-400">&#x5B9E;&#x65F6;&#x4E8B;&#x4EF6;</h2>
                <div id="events" class="log-container space-y-2 text-xs"></div>
            </div>
        </div>
    </div>

    <script>
        let configData = { upstreams: [] };

        async function loadConfig() {
            const res = await fetch('/api/config');
            configData = await res.json();
            document.getElementById('proxy_port').value = configData.proxy_port;
            document.getElementById('admin_port').value = configData.admin_port;
            document.getElementById('debug').checked = configData.debug;
            document.getElementById('redirect_all').checked = configData.redirect_all;
            document.getElementById('mitm_hosts').value = configData.mitm_hosts.join('\n');
            renderUpstreams();
        }

        function renderUpstreams() {
            const container = document.getElementById('upstreams-container');
            container.innerHTML = configData.upstreams.map((g, i) => `
                <div class="p-4 bg-slate-900/50 border border-slate-700 rounded-xl space-y-3">
                    <div class="flex justify-between items-center">
                        <input class="bg-transparent font-bold text-blue-400 focus:outline-none" value="${g.name}" onchange="configData.upstreams[${i}].name=this.value">
                        <button onclick="removeGroup(${i})" class="text-red-500 text-xs hover:underline">&#x5220;&#x9664;</button>
                    </div>
                    <div class="grid gap-2">
                        <input class="input-field text-xs" placeholder="Base URL" value="${g.base_url}" onchange="configData.upstreams[${i}].base_url=this.value">
                        <textarea class="input-field text-xs h-16" placeholder="Hosts (one per line)" onchange="configData.upstreams[${i}].hosts=this.value.split('\n').filter(h=>h.trim())">${g.hosts.join('\n')}</textarea>
                    </div>
                    <div class="flex items-center gap-2">
                        <input type="checkbox" ${g.is_remainder?'checked':''} onchange="setRemainder(${i}, this.checked)">
                        <span class="text-[10px] text-slate-500">&#x8D5C;&#x5E95;&#x89C4;&#x5219;</span>
                    </div>
                </div>
            `).join('');
        }

        function addGroup() {
            configData.upstreams.push({ name: '&#x65B0;&#x5206;&#x7EC4;', base_url: '', hosts: [], rewrites: [], headers: [], is_remainder: false });
            renderUpstreams();
        }

        function removeGroup(i) {
            configData.upstreams.splice(i, 1);
            renderUpstreams();
        }

        function setRemainder(idx, checked) {
            configData.upstreams.forEach((g, i) => g.is_remainder = (i === idx ? checked : false));
            renderUpstreams();
        }

        async function saveConfig() {
            configData.proxy_port = parseInt(document.getElementById('proxy_port').value);
            configData.admin_port = parseInt(document.getElementById('admin_port').value);
            configData.debug = document.getElementById('debug').checked;
            configData.redirect_all = document.getElementById('redirect_all').checked;
            configData.mitm_hosts = document.getElementById('mitm_hosts').value.split('\n').filter(h => h.trim());

            await fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(configData)
            });
            alert('&#x914D;&#x7F6E;&#x5DF2;&#x4FDD;&#x5B58;&#x5E76;&#x70ED;&#x52A0;&#x8F7D;&#xFF01;');
        }

        const es = new EventSource('/api/events');
        es.onmessage = e => {
            const data = JSON.parse(e.data);
            const div = document.createElement('div');
            div.className = 'flex gap-2 p-1 border-b border-slate-700/50';
            div.innerHTML = `<span class="text-slate-500">${data.time}</span><span class="font-bold truncate w-24">${data.host}</span><span class="text-blue-400 flex-1">${data.upstream}</span><span class="font-bold">${data.status}</span>`;
            const container = document.getElementById('events');
            container.insertBefore(div, container.firstChild);
            if (container.children.length > 50) container.removeChild(container.lastChild);
        };

        loadConfig();
    </script>
</body>
</html>
