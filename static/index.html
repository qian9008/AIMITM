<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AiMITM Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: sans-serif; }
        .log-container { height: 400px; overflow-y: auto; font-family: monospace; }
        .card { background: rgba(30, 41, 59, 0.5); border: 1px solid #334155; border-radius: 12px; padding: 20px; }
        .input-field { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 8px 12px; width: 100%; color: white; }
        .btn-primary { background: #2563eb; color: white; padding: 8px 16px; rounded: 8px; font-weight: bold; }
        .btn-primary:hover { background: #3b82f6; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-6xl mx-auto space-y-8">
        <header class="flex justify-between items-center border-b border-slate-800 pb-4">
            <h1 class="text-2xl font-bold text-white">AiMITM <span class="text-blue-500 text-sm">Core</span></h1>
            <div class="flex gap-4 text-xs">
                <span class="text-green-400">? Status: Running</span>
                <a href="/api/ca/download" class="text-slate-400 hover:text-white underline">Download CA Certificate</a>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="card md:col-span-2 space-y-4">
                <h2 class="font-bold text-lg text-blue-400">Core Settings</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] text-slate-500 mb-1">Proxy Port</label>
                        <input id="proxy_port" type="number" class="input-field">
                    </div>
                    <div>
                        <label class="block text-[10px] text-slate-500 mb-1">Admin Port</label>
                        <input id="admin_port" type="number" class="input-field">
                    </div>
                </div>
                <div class="flex items-center justify-between p-3 bg-slate-900/50 rounded-lg">
                    <span class="text-sm font-bold">Redirect All Traffic</span>
                    <input id="redirect_all" type="checkbox" class="w-5 h-5">
                </div>
                <div class="flex items-center justify-between p-3 bg-slate-900/50 rounded-xl">
                    <span class="text-sm">Debug Mode</span>
                    <input id="debug" type="checkbox" class="w-5 h-5">
                </div>
                <button onclick="saveConfig()" class="btn-primary w-full mt-4">Save & Apply Changes</button>
            </div>

            <div class="card space-y-4">
                <h2 class="font-bold text-lg text-blue-400">MITM Hosts</h2>
                <textarea id="mitm_hosts" class="input-field h-64 text-xs" placeholder="*.openai.com"></textarea>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="card space-y-4">
                <div class="flex justify-between items-center">
                    <h2 class="font-bold text-lg text-green-400">Forwarding Rules</h2>
                    <button onclick="addGroup()" class="text-xs bg-slate-700 px-2 py-1 rounded">+ Add Group</button>
                </div>
                <div id="upstreams-container" class="space-y-4"></div>
            </div>

            <div class="card space-y-4">
                <h2 class="font-bold text-lg text-orange-400">Live Traffic Logs</h2>
                <div id="events" class="log-container text-[10px] space-y-1"></div>
            </div>
        </div>
    </div>

    <script>
        let configData = { upstreams: [] };

        async function loadConfig() {
            try {
                const res = await fetch('/api/config');
                configData = await res.json();
                document.getElementById('proxy_port').value = configData.proxy_port;
                document.getElementById('admin_port').value = configData.admin_port;
                document.getElementById('debug').checked = configData.debug;
                document.getElementById('redirect_all').checked = configData.redirect_all;
                document.getElementById('mitm_hosts').value = configData.mitm_hosts.join('\n');
                renderUpstreams();
            } catch (err) {
                console.error("Failed to load config:", err);
            }
        }

        function renderUpstreams() {
            const container = document.getElementById('upstreams-container');
            container.innerHTML = configData.upstreams.map((g, i) => `
                <div class="p-3 bg-slate-900/50 border border-slate-700 rounded-lg space-y-2">
                    <div class="flex justify-between items-center">
                        <input class="bg-transparent font-bold text-blue-400 focus:outline-none" value="${g.name}" onchange="configData.upstreams[${i}].name=this.value">
                        <button onclick="removeGroup(${i})" class="text-red-500 text-[10px] uppercase">Remove</button>
                    </div>
                    <input class="input-field text-xs" placeholder="Base URL" value="${g.base_url}" onchange="configData.upstreams[${i}].base_url=this.value">
                    <textarea class="input-field text-[10px] h-12" onchange="configData.upstreams[${i}].hosts=this.value.split('\\n').filter(h=>h.trim())">${g.hosts.join('\n')}</textarea>
                </div>
            `).join('');
        }

        function addGroup() {
            configData.upstreams.push({ name: 'New Group', base_url: '', hosts: [], rewrites: [], headers: [], is_remainder: false });
            renderUpstreams();
        }

        function removeGroup(i) {
            configData.upstreams.splice(i, 1);
            renderUpstreams();
        }

        async function saveConfig() {
            configData.proxy_port = parseInt(document.getElementById('proxy_port').value);
            configData.admin_port = parseInt(document.getElementById('admin_port').value);
            configData.debug = document.getElementById('debug').checked;
            configData.redirect_all = document.getElementById('redirect_all').checked;
            configData.mitm_hosts = document.getElementById('mitm_hosts').value.split('\n').filter(h => h.trim());

            await fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(configData)
            });
            alert('Settings Saved & Hot-Reloaded!');
        }

        const es = new EventSource('/api/events');
        es.onmessage = e => {
            const data = JSON.parse(e.data);
            const div = document.createElement('div');
            div.className = 'flex gap-2 p-1 border-b border-slate-800/50';
            div.innerHTML = `<span>${data.time}</span><span class="font-bold text-blue-300 w-24 truncate">${data.host}</span><span class="flex-1">${data.upstream}</span><span class="font-bold">${data.status}</span>`;
            const container = document.getElementById('events');
            container.insertBefore(div, container.firstChild);
            if (container.children.length > 30) container.removeChild(container.lastChild);
        };

        loadConfig();
    </script>
</body>
</html>
