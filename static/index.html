<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AiMITM 管理后台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; }
        .log-container { height: 500px; overflow-y: auto; font-family: 'JetBrains Mono', monospace; }
        .card { @apply bg-slate-800/50 border border-slate-700 rounded-xl p-6 backdrop-blur-sm; }
        .input-field { @apply bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all; }
        .btn-primary { @apply bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-lg font-medium transition-all shadow-lg shadow-blue-500/20 active:scale-95; }
        .tab-btn { @apply px-4 py-2 font-medium transition-all border-b-2 border-transparent; }
        .tab-btn.active { @apply border-blue-500 text-blue-500; }
    </style>
</head>
<body class="p-8 min-h-screen">
    <div class="max-w-6xl mx-auto space-y-8">
        <!-- Header -->
        <header class="flex justify-between items-center">
            <div class="flex items-center">
                <div class="bg-blue-600 p-2 rounded-lg mr-3 shadow-lg shadow-blue-500/30">
                    <span class="font-black text-xl text-white">A</span>
                </div>
                <h1 class="text-2xl font-black tracking-tight text-white">AiMITM <span class="text-blue-500 text-sm font-normal">Core</span></h1>
            </div>
            <div class="flex gap-4 items-center text-sm">
                <span class="flex items-center"><span class="w-2 h-2 bg-green-500 rounded-full mr-2"></span> 节点在线</span>
                <span class="text-slate-400">|</span>
                <a href="/api/ca/download" class="text-slate-400 hover:text-white flex items-center">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    下载根证书
                </a>
            </div>
        </header>

        <!-- Tabs -->
        <div class="flex border-b border-slate-700 gap-4">
            <button class="tab-btn active">核心配置</button>
            <button class="tab-btn text-slate-400">实时日志</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- Config Card -->
            <div class="card md:col-span-2 space-y-6">
                <h2 class="text-lg font-bold">基础参数</h2>
                <div class="grid grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-xs text-slate-400 uppercase font-bold">代理端口</label>
                        <input id="proxy_port" type="number" class="input-field w-full">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs text-slate-400 uppercase font-bold">管理端口</label>
                        <input id="admin_port" type="number" class="input-field w-full">
                    </div>
                </div>

                <div class="flex items-center justify-between p-4 bg-slate-900/50 rounded-xl border border-slate-700">
                    <div>
                        <span class="text-sm font-bold text-red-400">全量重定向 (Redirect All)</span>
                        <p class="text-xs text-slate-500">开启后所有请求将进入分流逻辑</p>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input id="redirect_all" type="checkbox" class="sr-only peer">
                        <div class="w-11 h-6 bg-slate-700 rounded-full peer peer-checked:bg-blue-600 peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all"></div>
                    </label>
                </div>

                <div class="flex items-center gap-4">
                    <span class="text-sm text-slate-400">调试模式</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input id="debug" type="checkbox" class="sr-only peer">
                        <div class="w-11 h-6 bg-slate-700 rounded-full peer peer-checked:bg-blue-600 peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all"></div>
                    </label>
                </div>
            </div>

            <!-- MITM List Card -->
            <div class="card space-y-4">
                <h2 class="text-lg font-bold">MITM 域名</h2>
                <textarea id="mitm_hosts" class="input-field w-full h-64 text-sm font-mono" placeholder="*.openai.com"></textarea>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="card space-y-4">
                <div class="flex justify-between items-center">
                    <h2 class="text-lg font-bold">转发规则组</h2>
                    <button onclick="saveConfig()" class="btn-primary">保存配置</button>
                </div>
                <div id="upstreams-container" class="space-y-3"></div>
            </div>

            <div class="card space-y-4">
                <h2 class="text-lg font-bold text-blue-400">实时事件</h2>
                <div id="events" class="log-container space-y-2 text-xs"></div>
            </div>
        </div>
    </div>

    <script>
        async function loadConfig() {
            const res = await fetch('/api/config');
            const cfg = await res.json();
            document.getElementById('proxy_port').value = cfg.proxy_port;
            document.getElementById('admin_port').value = cfg.admin_port;
            document.getElementById('debug').checked = cfg.debug;
            document.getElementById('redirect_all').checked = cfg.redirect_all;
            document.getElementById('mitm_hosts').value = cfg.mitm_hosts.join('\n');
            
            const container = document.getElementById('upstreams-container');
            container.innerHTML = cfg.upstreams.map(g => `
                <div class="p-3 bg-slate-900/50 border border-slate-700 rounded-lg">
                    <div class="font-bold text-blue-400 mb-1">${g.name}</div>
                    <div class="text-[10px] text-slate-400">${g.base_url}</div>
                </div>
            `).join('');
        }

        async function saveConfig() {
            const cfg = {
                proxy_port: parseInt(document.getElementById('proxy_port').value),
                admin_port: parseInt(document.getElementById('admin_port').value),
                debug: document.getElementById('debug').checked,
                redirect_all: document.getElementById('redirect_all').checked,
                mitm_hosts: document.getElementById('mitm_hosts').value.split('\n').filter(h => h.trim()),
                upstreams: [] // 暂不修改 Upstreams 结构
            };
            await fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(cfg)
            });
            alert('配置已应用');
        }

        const es = new EventSource('/api/events');
        es.onmessage = e => {
            const data = JSON.parse(e.data);
            const div = document.createElement('div');
            div.className = 'flex gap-2 p-1 border-b border-slate-700/50';
            div.innerHTML = `
                <span class="text-slate-500">${data.time}</span>
                <span class="font-bold truncate w-24">${data.host}</span>
                <span class="text-blue-400 flex-1">${data.upstream}</span>
                <span class="font-bold">${data.status}</span>
            `;
            const container = document.getElementById('events');
            container.insertBefore(div, container.firstChild);
        };

        loadConfig();
    </script>
</body>
</html>
